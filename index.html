<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dodscoin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
    :root{--ink:#f4f4f5;--muted:#a1a1aa;--accent:#facc15;--card:rgba(15,15,25,0.85);--border:rgba(255,255,255,0.12)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Fredoka',system-ui,-apple-system,sans-serif;line-height:1.25;overflow-x:hidden;min-height:100vh;color:var(--ink)}

    /* SKY */
    .sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#070b1a 0%,#0c1445 40%,#162066 70%,#1a3a8a 100%);overflow:hidden}

    /* STARS */
    .stars{position:absolute;inset:0}
    .star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.7}
    .star:nth-child(1){top:8%;left:12%;animation:twinkle 2s infinite alternate}
    .star:nth-child(2){top:15%;left:45%;width:2px;height:2px;animation:twinkle 3s infinite alternate}
    .star:nth-child(3){top:5%;left:70%;animation:twinkle 2.5s infinite alternate}
    .star:nth-child(4){top:20%;left:85%;width:2px;height:2px;animation:twinkle 1.8s infinite alternate}
    .star:nth-child(5){top:12%;left:30%;animation:twinkle 2.2s infinite alternate}
    .star:nth-child(6){top:3%;left:55%;width:2px;height:2px;animation:twinkle 3.5s infinite alternate}
    .star:nth-child(7){top:25%;left:8%;animation:twinkle 2s infinite alternate}
    .star:nth-child(8){top:18%;left:60%;width:2px;height:2px;animation:twinkle 2.8s infinite alternate}
    @keyframes twinkle{0%{opacity:.3;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}

    /* MOON */
    .moon{position:absolute;top:8%;right:12%;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff9c4,#fdd835,#f9a825);box-shadow:0 0 40px 15px rgba(253,216,53,0.3),0 0 80px 30px rgba(253,216,53,0.15);z-index:2}
    .moon::after{content:'';position:absolute;top:20%;left:15%;width:25%;height:25%;border-radius:50%;background:rgba(245,193,7,0.5)}

    /* ROCKET */
    .rocket{position:absolute;top:22%;right:20%;z-index:3;animation:fly 4s ease-in-out infinite alternate}
    .rocket svg{width:60px;height:auto;filter:drop-shadow(0 0 12px rgba(250,204,21,0.5))}
    @keyframes fly{0%{transform:translateY(0) rotate(-15deg)}100%{transform:translateY(-18px) rotate(-10deg)}}

    /* TRAIL */
    .trail{position:absolute;top:30%;right:18%;z-index:1;animation:fly 4s ease-in-out infinite alternate}
    .trail svg{width:50px;height:auto;opacity:.6}

    /* SEA */
    .sea{position:fixed;bottom:0;left:0;right:0;height:35vh;z-index:1}
    .wave{position:absolute;bottom:0;width:200%;height:100%;animation:wave 8s linear infinite}
    .wave svg{width:100%;height:100%}
    .wave:nth-child(2){animation:wave 12s linear infinite reverse;opacity:.5;bottom:10px}
    @keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* REFLECTION */
    .reflection{position:fixed;bottom:0;left:0;right:0;height:35vh;z-index:0;background:linear-gradient(180deg,rgba(26,58,138,0.3) 0%,rgba(10,25,70,0.9) 100%);opacity:.4}

    /* CONTENT */
    .wrap{position:relative;z-index:10;max-width:420px;margin:0 auto;padding:36px 18px 50px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    header{text-align:center;margin-bottom:22px}
    .logo{width:90px;height:90px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 20px rgba(250,204,21,0.3)}
    h1{font-size:2rem;margin:12px 0 4px;color:var(--accent);text-shadow:0 0 20px rgba(250,204,21,0.3)}
    .sub{color:var(--muted);font-size:.88rem}
    .mint{display:block;word-break:break-all;color:var(--muted);font-size:.72rem;margin-top:8px;font-family:monospace}
    .links{display:grid;gap:10px;width:100%}
    a.link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);color:var(--ink);text-decoration:none;border-radius:14px;backdrop-filter:blur(12px);transition:transform .12s ease, border-color .12s ease}
    a.link:hover{transform:translateY(-2px);border-color:var(--accent)}
    .icon{width:22px;height:22px;fill:currentColor;flex-shrink:0}
    .label{font-weight:600;flex:1;font-size:.95rem}
    .hint{color:var(--muted);font-size:.72rem}
    footer{margin-top:28px;text-align:center;color:var(--muted);font-size:.72rem}

    /* REDUCED MOTION */
    @media(prefers-reduced-motion:reduce){
      .star,.rocket,.wave{animation:none!important}
    }
  </style>
