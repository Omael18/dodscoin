<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DODSC — Dodscoin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
    :root{--ink:#f4f4f5;--muted:#a1a1aa;--accent:#facc15;--card:rgba(8,22,58,0.82);--border:rgba(255,255,255,0.13);--sea-light:#38bdf8;--sea-mid:#0ea5e9;--sea-deep:#0369a1}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Fredoka',system-ui,-apple-system,sans-serif;line-height:1.25;overflow-x:hidden;min-height:100vh;color:var(--ink)}

    /* ===== SKY ===== */
    .sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#0b1026 0%,#111b42 30%,#1e3a6e 60%,#2d5aa0 85%,#3b82c8 100%);overflow:hidden}

    /* stars */
    .stars{position:absolute;inset:0}
    .star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.7}
    .star:nth-child(1){top:6%;left:10%;animation:twinkle 2.2s infinite alternate}
    .star:nth-child(2){top:14%;left:42%;width:2px;height:2px;animation:twinkle 3.1s infinite alternate}
    .star:nth-child(3){top:4%;left:68%;animation:twinkle 2.6s infinite alternate}
    .star:nth-child(4){top:18%;left:82%;width:2px;height:2px;animation:twinkle 1.9s infinite alternate}
    .star:nth-child(5){top:10%;left:28%;animation:twinkle 2.4s infinite alternate}
    .star:nth-child(6){top:2%;left:53%;width:2px;height:2px;animation:twinkle 3.6s infinite alternate}
    .star:nth-child(7){top:22%;left:6%;animation:twinkle 2.1s infinite alternate}
    .star:nth-child(8){top:16%;left:58%;width:2px;height:2px;animation:twinkle 2.9s infinite alternate}
    .star:nth-child(9){top:8%;left:75%;animation:twinkle 2s infinite alternate}
    .star:nth-child(10){top:25%;left:35%;width:2px;height:2px;animation:twinkle 3.3s infinite alternate}
    @keyframes twinkle{0%{opacity:.25;transform:scale(.7)}100%{opacity:1;transform:scale(1.3)}}

    /* ===== MOON ===== */
    .moon{position:absolute;top:6%;right:10%;width:95px;height:95px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff9c4,#fdd835,#f9a825);box-shadow:0 0 50px 18px rgba(253,216,53,0.3),0 0 100px 40px rgba(253,216,53,0.12);z-index:2}
    .moon::before{content:'';position:absolute;top:18%;left:14%;width:18%;height:18%;border-radius:50%;background:rgba(245,193,7,0.45)}
    .moon::after{content:'';position:absolute;top:45%;left:55%;width:12%;height:12%;border-radius:50%;background:rgba(245,193,7,0.3)}

    /* ===== ROCKET ===== */
    .rocket-wrap{position:absolute;top:18%;right:17%;z-index:4;animation:fly 4.5s ease-in-out infinite alternate}
    .rocket-wrap svg{width:65px;height:auto;filter:drop-shadow(0 0 14px rgba(250,204,21,0.5))}
    @keyframes fly{0%{transform:translateY(0) rotate(-16deg)}100%{transform:translateY(-20px) rotate(-10deg)}}

    /* trail sparkles */
    .trail{position:absolute;top:26%;right:14%;z-index:3;animation:fly 4.5s ease-in-out infinite alternate}
    .trail svg{width:55px;height:auto;opacity:.55}

    /* ===== SEA ===== */
    .sea{position:fixed;bottom:0;left:0;right:0;height:38vh;z-index:1;overflow:hidden}

    /* wave layers */
    .wave-layer{position:absolute;bottom:0;width:200%;height:100%}
    .wave-layer svg{width:100%;height:100%}
    .wave1{animation:drift 10s linear infinite}
    .wave2{animation:drift 14s linear infinite reverse;opacity:.7;bottom:6px}
    .wave3{animation:drift 18s linear infinite;opacity:.5;bottom:12px}
    @keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

    /* foam / white crest */
    .foam{position:absolute;bottom:34%;left:0;right:0;height:12px;z-index:2;opacity:.35}
    .foam svg{width:200%;height:100%;animation:drift 8s linear infinite}

    /* ===== BUBBLES ===== */
    .bubbles{position:absolute;inset:0;z-index:2;pointer-events:none}
    .bubble{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,0.35);background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.25),transparent);animation:rise linear infinite}
    .bubble:nth-child(1){left:15%;width:18px;height:18px;animation-duration:7s;animation-delay:0s}
    .bubble:nth-child(2){left:35%;width:12px;height:12px;animation-duration:9s;animation-delay:1s}
    .bubble:nth-child(3){left:55%;width:15px;height:15px;animation-duration:6s;animation-delay:2s}
    .bubble:nth-child(4){left:72%;width:10px;height:10px;animation-duration:8s;animation-delay:0.5s}
    .bubble:nth-child(5){left:25%;width:8px;height:8px;animation-duration:10s;animation-delay:3s}
    .bubble:nth-child(6){left:65%;width:14px;height:14px;animation-duration:7.5s;animation-delay:1.5s}
    .bubble:nth-child(7){left:45%;width:9px;height:9px;animation-duration:8.5s;animation-delay:2.5s}
    .bubble:nth-child(8){left:80%;width:11px;height:11px;animation-duration:6.5s;animation-delay:0.8s}
    .bubble:nth-child(9){left:10%;width:7px;height:7px;animation-duration:11s;animation-delay:4s}
    .bubble:nth-child(10){left:50%;width:13px;height:13px;animation-duration:7s;animation-delay:1.2s}
    .bubble:nth-child(11){left:30%;width:6px;height:6px;animation-duration:9.5s;animation-delay:3.5s}
    .bubble:nth-child(12){left:88%;width:10px;height:10px;animation-duration:8s;animation-delay:2.2s}
    @keyframes rise{0%{bottom:-5%;opacity:.7;transform:translateX(0) scale(1)}50%{opacity:.9;transform:translateX(8px) scale(1.05)}100%{bottom:105%;opacity:0;transform:translateX(-5px) scale(.9)}}

    /* ===== FISH ===== */
    .fish{position:absolute;z-index:2;animation:swim linear infinite}
    .fish svg{width:30px;height:auto;opacity:.45}
    .fish1{bottom:18%;left:-10%;animation-duration:16s;animation-delay:0s}
    .fish2{bottom:28%;left:-10%;animation-duration:22s;animation-delay:4s;transform:scaleX(-1)}
    .fish3{bottom:10%;left:-10%;animation-duration:14s;animation-delay:8s}
    @keyframes swim{0%{transform:translateX(0)}100%{transform:translateX(calc(100vw + 60px))}}

    /* ===== CONTENT ===== */
    .wrap{position:relative;z-index:10;max-width:420px;margin:0 auto;padding:36px 18px 50px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    header{text-align:center;margin-bottom:22px}
    .logo{width:92px;height:92px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 22px rgba(250,204,21,0.3)}
    h1{font-size:2.1rem;margin:12px 0 4px;color:var(--accent);text-shadow:0 0 22px rgba(250,204,21,0.35)}
    .sub{color:var(--muted);font-size:.88rem}
    .mint{display:block;word-break:break-all;color:var(--muted);font-size:.72rem;margin-top:8px;font-family:monospace}
    .links{display:grid;gap:10px;width:100%}
    a.link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);color:var(--ink);text-decoration:none;border-radius:14px;backdrop-filter:blur(12px);transition:transform .12s ease, border-color .12s ease}
    a.link:hover{transform:translateY(-2px);border-color:var(--accent)}
    .icon{width:22px;height:22px;fill:currentColor;flex-shrink:0}
    .label{font-weight:600;flex:1;font-size:.95rem}
    .hint{color:var(--muted);font-size:.72rem}
    footer{margin-top:28px;text-align:center;color:var(--muted);font-size:.72rem}

    @media(prefers-reduced-motion:reduce){.star,.rocket-wrap,.wave-layer,.foam,.bubble,.fish{animation:none!important}}
  </style>
