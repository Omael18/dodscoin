<!doctype html>
<html lang="fr">
<head>

  <title>Dodscoin</title>
  <style>
    :root{--bg:#0a0a0f;--card:#12121a;--ink:#f4f4f5;--muted:#a1a1aa;--accent:#facc15;--border:#24242e}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.25}
    .wrap{max-width:520px;margin:0 auto;padding:28px 18px 42px}
    header{text-align:center;margin-bottom:22px}
    .logo{width:84px;height:84px;border-radius:50%;border:2px solid var(--border);object-fit:cover}
    h1{font-size:1.7rem;margin:12px 0 4px}
    .sub{color:var(--muted);font-size:0.92rem}
    .mint{display:block;word-break:break-all;color:var(--muted);font-size:0.78rem;margin-top:8px}
    .links{display:grid;gap:12px}
    a.link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);color:var(--ink);text-decoration:none;border-radius:14px;transition:transform .12s ease, border-color .12s ease}
    a.link:hover{transform:translateY(-1px);border-color:var(--accent)}
    .icon{width:22px;height:22px;fill:currentColor}
    .label{font-weight:700;flex:1}
    .hint{color:var(--muted);font-size:0.78rem}
    footer{margin-top:26px;text-align:center;color:var(--muted);font-size:0.78rem}
  </style>
</head>
