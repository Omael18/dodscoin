<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DODSC — Dodsdog Dive</title>
  <style>
    :root{
      --navy:#07182f;
      --blue:#0b3d6e;
      --turquoise:#23d6c8;
      --gold:#ffd166;
      --white:#f7f7f7;
      --rock:#eadcc5;
      --rock2:#cdbb9b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,Arial,sans-serif;
      color:white;
      background:linear-gradient(180deg,#8fd7ff 0%,#d9f4ff 52%,#0b5f8f 53%,#063755 100%);
    }
    nav{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding:14px;
      background:rgba(3,18,38,.82);
      border-bottom:1px solid rgba(255,255,255,.15);
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(8px);
    }
    nav a{
      color:#eafaff;
      text-decoration:none;
      font-weight:800;
      padding:9px 13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
    }
    nav a:hover{background:rgba(35,214,200,.2)}
    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 30px}
    .title{text-align:center;margin:10px 0 14px}
    .title h1{margin:0;font-size:clamp(2rem,6vw,4rem);letter-spacing:-.04em;text-shadow:0 4px 0 rgba(0,0,0,.2)}
    .title p{margin:8px 0 0;color:#062947;font-weight:800}
    .scorebar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin:12px auto;
    }
    .pill{
      background:rgba(3,18,38,.8);
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      padding:9px 13px;
      font-weight:900;
      box-shadow:0 10px 25px rgba(0,0,0,.16);
    }
    .pill b{color:var(--gold)}
    .gamebox{
      position:relative;
      background:#8fd7ff;
      border:4px solid rgba(255,255,255,.85);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 25px 70px rgba(0,0,0,.28);
    }
    canvas{display:block;width:100%;height:auto;touch-action:manipulation;cursor:pointer}
    .controls{text-align:center;color:#062947;font-weight:900;margin-top:12px;line-height:1.45}
    button{
      border:0;
      border-radius:999px;
      padding:11px 18px;
      font-weight:1000;
      background:linear-gradient(135deg,#ffd166,#ff9f1c);
      color:#221400;
      cursor:pointer;
      box-shadow:0 10px 25px rgba(0,0,0,.18);
    }
  </style>
</head>
<body>
<nav>
  <a href="index.html">Home</a>
  <a href="game.html">Game</a>
  <a href="roadmap.html">Roadmap</a>
  <a href="security.html">Security</a>
  <a href="community.html">Community</a>
</nav>

<main class="wrap">
  <section class="title">
    <h1>🐕 Dodsdog Dive</h1>
    <p>Jump from the Marseille calanque — avoid the boat!</p>
  </section>

  <div class="scorebar">
    <div class="pill">🐕 Dives: <b id="dives">0</b></div>
    <div class="pill">📊 Marketcap height: <b id="height">1m</b></div>
    <div class="pill">🏆 Best: <b id="best">0</b></div>
    <div class="pill" id="status">Ready</div>
  </div>

  <section class="gamebox">
    <canvas id="game" width="900" height="520" aria-label="Dodsdog cliff diving game"></canvas>
  </section>

  <div class="controls">
    <p>Click / tap / press SPACE to jump. Land in the sea ✅ — hit the boat ❌</p>
    <button id="reset">Reset score</button>
  </div>
</main>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const divesEl = document.getElementById('dives');
  const bestEl = document.getElementById('best');
  const heightEl = document.getElementById('height');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');

  const WATER_Y = 285;
  const CLIFF_TOP = 110;
  const CLIFF_LEFT = 0;
  const CLIFF_RIGHT_TOP = 220;
  const CLIFF_RIGHT_WATER = 185;
  const CLIFF_BOTTOM = 360; // visible under water, but not full image height

  const DOG_START = { x: 188, y: CLIFF_TOP - 14 };
  let dog = { x: DOG_START.x, y: DOG_START.y, vx: 0, vy: 0, angle: 0, state: 'ready' };

  let boat = { x: 520, y: WATER_Y + 30, w: 125, h: 38, dir: 1, speed: 125 };
  let dives = 0;
  let best = Number(localStorage.getItem('dodsdog-best') || 0);
  let last = performance.now();
  let splashes = [];
  bestEl.textContent = best;

  // Marketcap height: practical rule requested by user:
  // 1000 mcap starts at 1m, 1M mcap = 50m.
  function mcapToMeters(mcap){
    if(!mcap || mcap <= 0) return 1;
    if(mcap <= 1000) return 1;
    if(mcap >= 1000000) return 50;
    return Math.max(1, Math.round(1 + ((mcap - 1000) / 999000) * 49));
  }

  async function updateHeight(){
    try{
      const res = await fetch('https://api.dexscreener.com/latest/dex/tokens/4nsq8dMuf6JqqaZpgbtCMVuRt9bYcrLS1Df5pGb4MWpx', {cache:'no-store'});
      const data = await res.json();
      const pair = data.pairs && data.pairs[0];
      const mcap = Number(pair?.marketCap || pair?.fdv || 0);
      heightEl.textContent = mcapToMeters(mcap) + 'm';
    }catch(e){
      heightEl.textContent = '1m';
    }
  }
  updateHeight();
  setInterval(updateHeight, 60000);

  function resetDog(){
    dog = { x: DOG_START.x, y: DOG_START.y, vx: 0, vy: 0, angle: 0, state: 'ready' };
    statusEl.textContent = 'Ready';
  }

  function jump(){
    if(dog.state !== 'ready') return;
    dog.state = 'jumping';
    dog.vx = 250;
    dog.vy = -135;
    dog.angle = -0.15;
    statusEl.textContent = 'Jump!';
  }

  function addSplash(x,y,good=true){
    for(let i=0;i<20;i++){
      splashes.push({
        x,y,
        vx:(Math.random()-.5)*170,
        vy:-Math.random()*160 - 30,
        life: good ? .9 : .65,
        color: good ? 'rgba(255,255,255,.85)' : 'rgba(255,90,90,.9)'
      });
    }
  }

  function hitBoat(){
    return dog.x > boat.x - 22 && dog.x < boat.x + boat.w + 22 && dog.y > boat.y - 35 && dog.y < boat.y + boat.h + 24;
  }

  function drawSky(){
    const sky = ctx.createLinearGradient(0,0,0,WATER_Y);
    sky.addColorStop(0,'#7dcfff');
    sky.addColorStop(1,'#dff7ff');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,WATER_Y);

    // sun
    ctx.fillStyle = '#ffd166';
    ctx.beginPath(); ctx.arc(765,78,42,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,209,102,.2)';
    ctx.beginPath(); ctx.arc(765,78,70,0,Math.PI*2); ctx.fill();

    // static clouds
    drawCloud(115,70,1.0); drawCloud(430,95,.8); drawCloud(655,145,.65);
  }

  function drawCloud(x,y,s){
    ctx.fillStyle='rgba(255,255,255,.9)';
    const puffs=[[-35,6,22],[-14,-5,28],[10,0,24],[32,8,19],[0,13,31]];
    for(const [px,py,r] of puffs){ctx.beginPath();ctx.arc(x+px*s,y+py*s,r*s,0,Math.PI*2);ctx.fill();}
  }

  function cliffXAt(y){
    if(y <= CLIFF_TOP) return CLIFF_RIGHT_TOP;
    if(y >= CLIFF_BOTTOM) return CLIFF_RIGHT_WATER + 34;
    const t = (y - CLIFF_TOP) / (CLIFF_BOTTOM - CLIFF_TOP);
    return CLIFF_RIGHT_TOP - 35*t + Math.sin(t*Math.PI*2)*10;
  }

  function drawWater(){
    const water = ctx.createLinearGradient(0,WATER_Y,0,H);
    water.addColorStop(0,'#48e0d6');
    water.addColorStop(.35,'#16aeb3');
    water.addColorStop(1,'#08718d');
    ctx.fillStyle = water;
    ctx.fillRect(0,WATER_Y,W,H-WATER_Y);

    // surface line
    ctx.strokeStyle='rgba(255,255,255,.45)';
    ctx.lineWidth=3;
    ctx.beginPath();
    for(let x=0;x<=W;x+=8){
      const y = WATER_Y + Math.sin(x*.035 + performance.now()*.002)*3;
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();

    // light waves, no dark black patch
    ctx.strokeStyle='rgba(255,255,255,.22)';
    ctx.lineWidth=2;
    for(let r=0;r<5;r++){
      ctx.beginPath();
      const y = WATER_Y + 45 + r*33;
      for(let x=235;x<W;x+=10){
        const yy = y + Math.sin(x*.03+r)*3;
        if(x===235) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
      }
      ctx.stroke();
    }
  }

  function drawCliff(){
    // Main static white limestone rock. Drawn AFTER water so rock remains visible under water.
    const grad = ctx.createLinearGradient(0,CLIFF_TOP,0,CLIFF_BOTTOM);
    grad.addColorStop(0,'#f4eadb');
    grad.addColorStop(.5,'#ddcdb1');
    grad.addColorStop(1,'#c6b28d');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(CLIFF_LEFT,CLIFF_TOP);
    ctx.lineTo(CLIFF_RIGHT_TOP,CLIFF_TOP);
    for(let i=0;i<=24;i++){
      const y = CLIFF_TOP + (CLIFF_BOTTOM-CLIFF_TOP)*(i/24);
      ctx.lineTo(cliffXAt(y),y);
    }
    ctx.lineTo(CLIFF_LEFT,CLIFF_BOTTOM);
    ctx.closePath();
    ctx.fill();

    // lighter face at water contact so it never looks blue/black
    ctx.fillStyle='rgba(245,234,216,.72)';
    ctx.beginPath();
    ctx.moveTo(0,WATER_Y-8);
    ctx.lineTo(cliffXAt(WATER_Y)+10,WATER_Y-8);
    ctx.lineTo(cliffXAt(CLIFF_BOTTOM),CLIFF_BOTTOM);
    ctx.lineTo(0,CLIFF_BOTTOM);
    ctx.closePath();
    ctx.fill();

    // fixed rock strata, no random in draw = no shaking
    ctx.strokeStyle='rgba(110,88,58,.22)';
    ctx.lineWidth=2;
    const lines = [132,154,181,207,232,257,286,316,342];
    for(const y of lines){
      ctx.beginPath();
      ctx.moveTo(12,y);
      ctx.lineTo(cliffXAt(y)-18,y+Math.sin(y*.05)*2);
      ctx.stroke();
    }

    // edge highlight
    ctx.strokeStyle='rgba(255,250,235,.9)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(CLIFF_RIGHT_TOP,CLIFF_TOP);
    for(let i=0;i<=24;i++){
      const y = CLIFF_TOP + (CLIFF_BOTTOM-CLIFF_TOP)*(i/24);
      ctx.lineTo(cliffXAt(y),y);
    }
    ctx.stroke();

    // tiny static green top, not animated
    ctx.fillStyle='rgba(104,150,67,.55)';
    ctx.beginPath();
    ctx.ellipse(82,CLIFF_TOP+3,58,7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(156,CLIFF_TOP+2,47,6,0,0,Math.PI*2); ctx.fill();
  }

  function drawBoat(){
    ctx.save();
    ctx.translate(boat.x, boat.y);
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(0,20); ctx.lineTo(boat.w,20); ctx.lineTo(boat.w-20,boat.h); ctx.lineTo(18,boat.h); ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#e63946';
    ctx.fillRect(28,6,48,16);
    ctx.fillStyle='#ffd166';
    ctx.fillRect(82,10,20,10);
    ctx.strokeStyle='rgba(255,255,255,.6)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-20,boat.h+5); ctx.lineTo(boat.w+20,boat.h+5); ctx.stroke();
    ctx.restore();
  }

  function drawDodsdog(){
    ctx.save();
    ctx.translate(dog.x,dog.y);
    ctx.rotate(dog.angle);

    // shadow on cliff/water
    if(dog.state === 'ready'){
      ctx.fillStyle='rgba(0,0,0,.18)';
      ctx.beginPath(); ctx.ellipse(0,28,35,8,0,0,Math.PI*2); ctx.fill();
    }

    // body sable
    ctx.fillStyle='#b8792f';
    ctx.beginPath(); ctx.ellipse(-8,2,34,18,0,0,Math.PI*2); ctx.fill();

    // long white chest
    ctx.fillStyle='#fff7ef';
    ctx.beginPath(); ctx.ellipse(8,6,16,20,-.2,0,Math.PI*2); ctx.fill();

    // tail
    ctx.strokeStyle='#b8792f'; ctx.lineWidth=12; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-38,2); ctx.quadraticCurveTo(-60,-20,-44,-36); ctx.stroke();
    ctx.strokeStyle='#fff7ef'; ctx.lineWidth=7;
    ctx.beginPath(); ctx.moveTo(-47,-30); ctx.lineTo(-41,-38); ctx.stroke();

    // legs/paws
    ctx.strokeStyle='#8f5a24'; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-16,15); ctx.lineTo(-18,31); ctx.moveTo(10,15); ctx.lineTo(13,31); ctx.stroke();
    ctx.strokeStyle='#fff7ef'; ctx.lineWidth=7;
    ctx.beginPath(); ctx.moveTo(-18,25); ctx.lineTo(-20,33); ctx.moveTo(13,25); ctx.lineTo(15,33); ctx.stroke();

    // neck/head
    ctx.fillStyle='#b8792f';
    ctx.beginPath(); ctx.ellipse(25,-13,18,15,-.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(42,-11,14,9,0,0,Math.PI*2); ctx.fill();

    // white face blaze/snout
    ctx.fillStyle='#fff7ef';
    ctx.beginPath(); ctx.ellipse(39,-10,8,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(25,-24,8,18);

    // ears
    ctx.fillStyle='#7b471d';
    ctx.beginPath(); ctx.moveTo(16,-24); ctx.lineTo(20,-48); ctx.lineTo(30,-25); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(31,-25); ctx.lineTo(38,-45); ctx.lineTo(43,-22); ctx.closePath(); ctx.fill();

    // eye/nose
    ctx.fillStyle='#1b120b';
    ctx.beginPath(); ctx.arc(31,-16,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(54,-11,3.2,0,Math.PI*2); ctx.fill();

    // collar DODSC
    ctx.strokeStyle='#23d6c8'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(11,-7); ctx.lineTo(23,-5); ctx.stroke();

    ctx.restore();
  }

  function drawSplashes(dt){
    for(const s of splashes){
      ctx.fillStyle=s.color;
      ctx.beginPath(); ctx.arc(s.x,s.y,3.5,0,Math.PI*2); ctx.fill();
    }
  }

  function drawScene(dt){
    drawSky();
    drawWater();
    drawCliff();
    drawBoat();
    drawDodsdog();
    drawSplashes(dt);
  }

  function update(dt){
    boat.x += boat.dir * boat.speed * dt;
    if(boat.x < 285){ boat.x = 285; boat.dir = 1; }
    if(boat.x + boat.w > W - 35){ boat.x = W - 35 - boat.w; boat.dir = -1; }

    if(dog.state === 'jumping'){
      dog.x += dog.vx * dt;
      dog.y += dog.vy * dt;
      dog.vy += 520 * dt;
      dog.angle += 1.8 * dt;

      if(hitBoat()){
        dog.state = 'crash';
        dog.vx = 0; dog.vy = 0;
        addSplash(dog.x,dog.y,false);
        statusEl.textContent = 'CRASH! Boat hit ❌';
        setTimeout(resetDog, 1100);
      } else if(dog.y >= WATER_Y + 22){
        dog.state = 'splash';
        addSplash(dog.x,WATER_Y+18,true);
        dives++;
        best = Math.max(best, dives);
        localStorage.setItem('dodsdog-best', String(best));
        divesEl.textContent = dives;
        bestEl.textContent = best;
        statusEl.textContent = 'Splash! ✅';
        setTimeout(resetDog, 1000);
      }
    }

    for(const s of splashes){
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 360 * dt;
      s.life -= dt;
    }
    splashes = splashes.filter(s => s.life > 0);
  }

  function loop(now){
    const dt = Math.min(.033,(now-last)/1000);
    last = now;
    update(dt);
    drawScene(dt);
    requestAnimationFrame(loop);
  }

  canvas.addEventListener('click', jump);
  window.addEventListener('keydown', e => { if(e.code === 'Space'){ e.preventDefault(); jump(); }});
  resetBtn.addEventListener('click', () => {
    dives = 0;
    divesEl.textContent = '0';
    statusEl.textContent = 'Score reset';
    resetDog();
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
